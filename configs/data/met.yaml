name: met

csv_path: data/raw/MetObjects.csv
save_dir: data/raw/met

api_url: https://collectionapi.metmuseum.org/public/collection/v1/objects/{object_id}
image_field: primaryImage

filters:
  classification: painting
  medium_include: ["oil", "tempera", "fresco"]
  medium_exclude: ["print", "drawing", "etching", "lithograph", "engraving", "sculpture"]
  date_range: [1400, 1600]
  department: european

functions:
  get_items: get_met_items
  extract_image: extract_met_image