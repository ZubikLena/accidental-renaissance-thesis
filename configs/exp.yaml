experiment:
  name: accidental_renaissance_classification
  raw_root: data/raw
  source_label_map:
    coco_data: ordinary
    met_data: paintings
    reddit_data: accidental
    rijks_data: paintings
    wikiart_data: paintings
  image_size: 224
  seed: 42
  selected_labels: # alter for different classification tasks
    - ordinary
    - accidental
  split:
    train: 0.8
    val: 0.1
    test: 0.1
augmentation:
  strategy: standard
  resize: 256
  crop: 224
  horizontal_flip: true
  rotation: 15
  color_jitter:
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.1
  auto_augment: false
balancing:
  strategy: none #`none`, `downsample`, `oversample`, `class_weight`
model:
  name: resnet50
  pretrained: true
  freeze_backbone: true
  head_hidden: 512
  dropout: 0.3
training:
  optimizer:
    name: adam
    lr: 0.0001
    weight_decay: 0.0001
  loss:
    name: cross_entropy
    label_smoothing: 0.0
  batch_size: 32
  num_epochs: 10
  device: cuda
  num_workers: 0
  output_dir: outputs/models
  save_split_records: true
  split_output_dir: outputs/splits
  metrics:
    f1_average: macro
  early_stopping:
    enabled: true
    monitor: val_loss
    mode: min
    patience: 3
    min_delta: 0.0
